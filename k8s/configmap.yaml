apiVersion: v1
kind: ConfigMap
metadata:
  name: companygraph-config
  namespace: companygraph-prod
data:
  # Application configuration
  LOG_LEVEL: "INFO"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "1000"
  
  # Feature flags
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  ENABLE_RATE_LIMITING: "true"
  
  # Data ingest configuration
  KAFKA_ENABLED: "false"  # Enable when Kafka is deployed
  AIRFLOW_ENABLED: "false"  # Enable when Airflow is deployed
