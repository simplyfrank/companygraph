apiVersion: apps/v1
kind: Deployment
metadata:
  name: companygraph-api
  namespace: companygraph-prod
  labels:
    app: companygraph-api
    component: api
spec:
  replicas: 6
  selector:
    matchLabels:
      app: companygraph-api
  template:
    metadata:
      labels:
        app: companygraph-api
        component: api
    spec:
      containers:
      - name: api
        image: companygraph/api:latest
        ports:
        - containerPort: 8787
          name: http
        env:
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: companygraph-secrets
              key: neo4j-uri
        - name: NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: companygraph-secrets
              key: neo4j-user
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: companygraph-secrets
              key: neo4j-password
        - name: HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "8787"
        envFrom:
        - configMapRef:
            name: companygraph-config
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /api/v1/healthz
            port: 8787
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8787
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 30"]
---
apiVersion: v1
kind: Service
metadata:
  name: companygraph-api
  namespace: companygraph-prod
  labels:
    app: companygraph-api
spec:
  type: ClusterIP
  ports:
  - port: 8787
    targetPort: 8787
    name: http
  selector:
    app: companygraph-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: companygraph-api-hpa
  namespace: companygraph-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: companygraph-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
