# Kubernetes secrets for CompanyGraph
# NOTE: In production, use Sealed Secrets or External Secrets Operator
# This file is for reference only - do not commit actual secrets

apiVersion: v1
kind: Secret
metadata:
  name: companygraph-secrets
  namespace: companygraph-prod
type: Opaque
stringData:
  # Neo4j credentials
  neo4j-uri: "bolt://neo4j:7687"
  neo4j-user: "neo4j"
  neo4j-password: "CHANGE_ME_IN_PRODUCTION"
  
  # OneLogin OAuth credentials (when SSO is implemented)
  # onelogin-client-id: "CHANGE_ME"
  # onelogin-client-secret: "CHANGE_ME"
  # onelogin-issuer: "https://companygraph.onelogin.com/oidc"
  
  # API keys (if needed)
  # anthropic-api-key: "CHANGE_ME"
