# Neo4j Causal Cluster setup for production
# Uses Neo4j Helm chart with 3 core nodes for high availability

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data-0
  namespace: companygraph-prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data-1
  namespace: companygraph-prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data-2
  namespace: companygraph-prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 500Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: companygraph-prod
  labels:
    app: neo4j
spec:
  serviceName: neo4j
  replicas: 3
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.15.0-enterprise
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7473
          name: https
        - containerPort: 7687
          name: bolt
        - containerPort: 6362
          name: cluster
        - containerPort: 7688
          name: discovery
        env:
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: companygraph-secrets
              key: neo4j-password
        - name: NEO4J_dbms_mode
          value: "CORE"
        - name: NEO4J_causal__clustering_minimum__core__cluster__size__at__formation
          value: "3"
        - name: NEO4J_causal__clustering_minimum__core__cluster__size__at__runtime
          value: "3"
        - name: NEO4J_causal__clustering_initial__discovery__members
          value: "neo4j-0.neo4j.companygraph-prod.svc.cluster.local:5000,neo4j-1.neo4j.companygraph-prod.svc.cluster.local:5000,neo4j-2.neo4j.companygraph-prod.svc.cluster.local:5000"
        - name: NEO4J_causal__clustering_discovery__advertised__address
          value: "$(hostname -f):5000"
        - name: NEO4J_causal__clustering_transaction__advertised__address
          value: "$(hostname -f):6000"
        - name: NEO4J_causal__clustering_raft__advertised__address
          value: "$(hostname -f):7000"
        - name: NEO4J_dbms_connector_bolt_advertised__address
          value: "$(hostname -f):7687"
        - name: NEO4J_dbms_connector_http_advertised__address
          value: "$(hostname -f):7474"
        - name: NEO4J_dbms_memory_heap_initial__size
          value: "4g"
        - name: NEO4J_dbms_memory_heap_max__size
          value: "8g"
        - name: NEO4J_dbms_memory_pagecache_size
          value: "12g"
        - name: NEO4J_dbms_connector_bolt_thread__pool__max__size
          value: "400"
        - name: NEO4J_dbms_connector_http_thread__pool__max__size
          value: "200"
        resources:
          requests:
            cpu: "2"
            memory: 16Gi
          limits:
            cpu: "4"
            memory: 32Gi
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: neo4j-data
        persistentVolumeClaim:
          claimName: neo4j-data-0
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: companygraph-prod
spec:
  clusterIP: None
  ports:
  - port: 7474
    name: http
  - port: 7473
    name: https
  - port: 7687
    name: bolt
  - port: 5000
    name: discovery
  - port: 6000
    name: transaction
  - port: 7000
    name: raft
  selector:
    app: neo4j
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-bolt
  namespace: companygraph-prod
spec:
  type: ClusterIP
  ports:
  - port: 7687
    targetPort: 7687
    name: bolt
  selector:
    app: neo4j
