name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      # Unit tests import modules that call loadEnv() which requires
      # NEO4J_PASSWORD to be set. No Neo4j connection is made — the
      # value just satisfies the env validation guard.
      NEO4J_PASSWORD: unit_test_dummy
      POSTGRES_URI: postgresql://companygraph:unit_test_dummy@127.0.0.1:5432/companygraph
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: docker compose config -q
      - run: bun run test
      # kpi-okr-governance T-20 (review C-02) — CI-gate exactly the two
      # AC-14/AC-15 exec-view pin files. Deliberately scoped to the two
      # owned files rather than the whole pwa vitest suite: the legacy
      # error-scenarios tree is un-triaged and adopting it wholesale into
      # the merge gate is out of this spec's charter.
      # story-spec-core T-18 (review C-08) — same per-file pattern: gate the
      # three StoryCatalog component test files (AC-10…AC-14 artifacts).
      # kpi-okr-performance-dashboards T-19 — same scoped-enumeration
      # rationale: append (never remove/reorder) the two owned
      # PerformanceDashboard test files (AC-07/08/09/11/12 auto legs).
      # ddd-system-modeling T-19 — same scoped-enumeration rationale:
      # append (never remove/reorder) the six owned SystemModeler test
      # files (AC-10..14, AC-20 component half).
      # business-model-authoring T-14 — append the owned ModelCanvas
      # test file (AC-10 component half: view registration + states).
      # cross-function-exec-rollup T-15 — append (never remove/reorder) the
      # two owned OperatorCockpit test files (AC-12/13/14/15 auto legs).
      - run: bunx vitest run src/__tests__/exec-kpi-management.test.tsx src/__tests__/exec-okr-management.test.tsx src/__tests__/story-catalog.test.tsx src/__tests__/story-detail.test.tsx src/__tests__/story-catalog-states.test.tsx src/__tests__/performance-dashboard.test.tsx src/__tests__/performance-dashboard-a11y.test.tsx src/__tests__/system-modeler-states.test.tsx src/__tests__/system-modeler-kind.test.tsx src/__tests__/system-modeler.test.tsx src/__tests__/system-modeler-gaps.test.tsx src/__tests__/system-modeler-context-map.test.tsx src/__tests__/system-modeler-detail.test.tsx src/__tests__/model-canvas.test.tsx src/__tests__/operator-cockpit.test.tsx src/__tests__/operator-cockpit-states.test.tsx
        working-directory: pwa

  integration:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/companygraph_ci_password
          NEO4J_server_memory_pagecache_size: "256m"
          NEO4J_server_memory_heap_max__size: "1g"
          # APOC required by ontology-manager migrations + forceBackfill
          # path + system-kind-migration drift backfill (uses
          # apoc.convert.fromJsonMap / apoc.map.setKey). Must match
          # docker-compose.yml's NEO4J_PLUGINS setting.
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
      # kpi-okr-governance T-20 / FR-17 (design §4.8, DD-10) — Postgres
      # service so the kpi-measurements / sla-breaches routes are tested
      # in CI. Image matches docker-compose.yml.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: companygraph
          POSTGRES_PASSWORD: companygraph_ci_password
          POSTGRES_DB: companygraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companygraph"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: companygraph_ci_password
      NEO4J_URI: bolt://localhost:7687
      HOST: 127.0.0.1
      API_PORT: 8787
      POSTGRES_URI: postgresql://companygraph:companygraph_ci_password@localhost:5432/companygraph
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # run-migrations.ts resolves the migrations dir relative to cwd —
      # the `cd api` is required. Logs "applied" per migration (AC-19).
      - run: cd api && bun run src/storage/postgres/run-migrations.ts
      # kpi-okr-governance V-03 — every *.integration.test.ts fetches
      # http://127.0.0.1:8787; without a running server the job cannot
      # pass. Boot in the background, wait for healthz, then HARD-assert:
      # the wait loop alone exits 0 on timeout, so the final curl is the
      # load-bearing check (design C-02 fix) and dumps the server log on
      # failure right here, not ten files deep in the test step.
      - name: Boot API server
        run: |
          cd api
          (bun run src/server.ts > "$RUNNER_TEMP/api-server.log" 2>&1 &)
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8787/api/v1/healthz > /dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8787/api/v1/healthz \
            || { echo "::error::API server failed to boot"; cat "$RUNNER_TEMP/api-server.log"; exit 1; }
      # Bun 1.3.x transpiler bug: in large test suites, ESM exports from
      # ontology/cache/{schema,edge-endpoints,attribute-zod}.ts are stripped.
      # The ontology-cache test imports these directly and fails with a
      # SyntaxError. Run it in isolation first, then run the rest of the
      # suite excluding that file.
      - run: cd api && bun test --test-name-pattern '^integration:' --max-concurrency 1 __tests__/ontology-cache.integration.test.ts
      - run: bun run test:integration
