# Static SPA server for the CompanyGraph PWA. Runs unprivileged on :8080.
# API traffic (/api/v1) is routed to the API Service by the k8s Ingress, so
# this server only serves the built assets with an index.html fallback.
worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Writable temp paths so the container can run with a read-only-ish rootfs.
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets.
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback — every other path serves index.html.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
