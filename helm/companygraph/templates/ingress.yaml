{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "companygraph.fullname" . }}
  labels:
    {{- include "companygraph.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API first — more specific prefix wins.
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "companygraph.api.fullname" . }}
                port:
                  number: {{ .Values.api.service.port }}
          # Everything else → the PWA (SPA fallback lives in the pwa image).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "companygraph.pwa.fullname" . }}
                port:
                  number: {{ .Values.pwa.service.port }}
{{- end }}
