apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "companygraph.configMapName" . }}
  labels:
    {{- include "companygraph.labels" . | nindent 4 }}
data:
  # Bind to all interfaces inside the pod (NFR-02 loopback default is overridden
  # here on purpose; auth stays enforced via ONELOGIN_ISSUER below).
  HOST: "0.0.0.0"
  API_PORT: {{ .Values.api.service.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  NEO4J_URI: {{ include "companygraph.neo4jUri" . | quote }}
  NEO4J_USER: {{ .Values.neo4j.auth.user | quote }}
  # SQLite paths on the mounted PVC.
  CHAT_DB_PATH: {{ printf "%s/chat.db" .Values.api.persistence.mountPath | quote }}
  ANALYTICS_DB_PATH: {{ printf "%s/analytics.sqlite" .Values.api.persistence.mountPath | quote }}
  ONELOGIN_ISSUER: {{ .Values.config.oneloginIssuer | quote }}
  ONELOGIN_CLIENT_ID: {{ .Values.config.oneloginClientId | quote }}
  ONELOGIN_REDIRECT_URI: {{ .Values.config.oneloginRedirectUri | quote }}
  OPT_ONTOLOGY_AUDIT_RETENTION_DAYS: {{ .Values.config.ontologyAuditRetentionDays | quote }}
  OPT_ONTOLOGY_AUDIT_CRON: {{ .Values.config.ontologyAuditCron | quote }}
