apiVersion: v1
kind: Service
metadata:
  name: {{ include "companygraph.fullname" . }}-api
  labels:
    {{- include "companygraph.labels" . | nindent 4 }}
    component: api
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "companygraph.selectorLabels" . | nindent 4 }}
    component: api
