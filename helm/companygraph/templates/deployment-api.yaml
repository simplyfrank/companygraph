apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "companygraph.fullname" . }}-api
  labels:
    {{- include "companygraph.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "companygraph.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "companygraph.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "companygraph.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: api
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
        imagePullPolicy: {{ .Values.image.api.pullPolicy }}
        ports:
        - name: http
          containerPort: 8787
          protocol: TCP
        env:
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "companygraph.fullname . }}-secrets
              key: neo4j-uri
        - name: NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "companygraph.fullname . }}-secrets
              key: neo4j-user
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "companygraph.fullname . }}-secrets
              key: neo4j-password
        - name: HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "8787"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENABLE_METRICS
          value: {{ .Values.features.metrics.enabled | quote }}
        - name: ENABLE_TRACING
          value: {{ .Values.features.tracing.enabled | quote }}
        - name: ENABLE_RATE_LIMITING
          value: {{ .Values.features.rateLimiting.enabled | quote }}
        - name: RATE_LIMIT_WINDOW_MS
          value: {{ .Values.rateLimit.windowMs | quote }}
        - name: RATE_LIMIT_MAX_REQUESTS
          value: {{ .Values.rateLimit.maxRequests | quote }}
        resources:
          {{- toYaml .Values.resources.api | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/v1/healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 30"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
