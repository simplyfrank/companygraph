{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "companygraph.secretName" . }}
  labels:
    {{- include "companygraph.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Neo4j — password plus the combined user/password form the neo4j image wants.
  neo4j-password: {{ .Values.neo4j.auth.password | quote }}
  neo4j-auth: {{ printf "%s/%s" .Values.neo4j.auth.user .Values.neo4j.auth.password | quote }}
  # Postgres — the API consumes the full URI; the postgres image consumes the
  # password. When postgres.deploy is false, override postgres-uri via an
  # existingSecret to point at your managed instance.
  postgres-password: {{ .Values.postgres.auth.password | quote }}
  postgres-uri: {{ include "companygraph.postgresUri" . | quote }}
  # Optional application secrets.
  anthropic-api-key: {{ .Values.secret.anthropicApiKey | quote }}
  onelogin-client-secret: {{ .Values.secret.oneloginClientSecret | quote }}
{{- end }}
