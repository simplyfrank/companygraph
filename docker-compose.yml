# Local Neo4j and PostgreSQL for development. Production deployment is out of
# scope for this spec — do not use this file in production.
#
# Variables default to dev values so `docker compose config -q` works
# without a .env (e.g. in CI). Override via .env for local dev.

services:
  neo4j:
    image: neo4j:5-community
    container_name: companygraph_neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-companygraph_dev}"
      NEO4J_server_memory_pagecache_size: "256m"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "1g"
      # APOC required by ontology-manager migrations + forceBackfill path
      # (graph-core/design.md §8.3 + ontology-manager/design.md §4.1 + §4.7).
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7474:7474"
    volumes:
      - companygraph_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: companygraph_postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-companygraph}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-companygraph_dev}"
      POSTGRES_DB: "${POSTGRES_DB:-companygraph}"
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - companygraph_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-companygraph}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  companygraph_neo4j_data:
    name: companygraph_neo4j_data
  companygraph_postgres_data:
    name: companygraph_postgres_data
