# companygraph design system — canonical token registry.
#
# Generated 2026-05-23 by /wireframe-extract --discover from the
# `:root` block in design/companygraph/companygraph-views.html.
#
# Edit THIS file (not pwa/src/styles/companygraph/tokens.css) to change
# a token. Re-run `bun run scripts/stitch-tokens-to-css.ts` to regenerate
# the CSS.
#
# Schema matches the PA /stitch skill expectation, with one companygraph
# deviation: the OKLCH custom-property names in the mock are short and
# flat (`--bg`, `--surface-2`, `--font-display`, `--rail-w`). The PA
# emitter prefixes them (`--color-bg`, `--type-*`, `--space-*`,
# `--radius-*`). Components written against the mock convention need to
# either be updated to use the prefixed names OR the emitter needs to
# learn about an optional `colorPrefix: ""` / `typePrefix: ""` config.
# TODO(companygraph-emitter): pick one and document.

name: "companygraph"
description: "Calm, dense, software-tool. Linear / Vercel / Stripe-dashboard cousin. No gradients."
mode: "light"

fonts:
  headline: "SF Pro Display"
  body: "SF Pro Text"
  label: "SF Pro Text"
  icon: "SF Mono"
  # No web fonts; companygraph uses OS-native stacks.
  google_fonts_url: ""

colors:
  bg:            "oklch(99% 0.002 240)"
  surface:       "oklch(100% 0 0)"
  surface-2:     "oklch(98% 0.004 250)"
  fg:            "oklch(18% 0.012 250)"
  muted:         "oklch(54% 0.012 250)"
  muted-2:       "oklch(70% 0.01 250)"
  border:        "oklch(92% 0.005 250)"
  border-strong: "oklch(86% 0.008 250)"
  accent:        "oklch(58% 0.18 255)"
  accent-soft:   "oklch(96% 0.025 255)"
  # Five-stop mono-ramp derived from --accent (hue 255) — cto-analytics T-21
  # (design §2 Pin-4). Lightness descends 100→900; chroma tracks lightness so
  # the mid stop (-500) equals the base accent. Consumed by the FR-01 system
  # map's cluster coloring (Systems.tsx) and detokenised charts (RD-5).
  accent-100:    "oklch(92% 0.05 255)"
  accent-300:    "oklch(76% 0.12 255)"
  accent-500:    "oklch(58% 0.18 255)"
  accent-700:    "oklch(44% 0.15 255)"
  accent-900:    "oklch(30% 0.1 255)"
  good:          "oklch(58% 0.16 145)"
  warn:          "oklch(70% 0.16 75)"
  danger:        "oklch(60% 0.22 25)"
  # Darker text variants used on tinted (warn/danger/good) chip backgrounds.
  warn-text:        "oklch(40% 0.08 75)"
  warn-text-strong: "oklch(36% 0.1 75)"
  danger-text:        "oklch(40% 0.12 25)"
  danger-text-strong: "oklch(35% 0.16 25)"
  good-text:          "oklch(38% 0.08 145)"
  # Pure white — primary-button foreground.
  on-accent:     "oklch(100% 0 0)"
  # DD-02 semantic ramps — categorical (distinguishable, non-ordinal)
  cat-1:         "oklch(70% 0.16 75)"    # amber — open / Role / warn node
  cat-2:         "oklch(62% 0.17 255)"   # blue — mitigating / Activity
  cat-3:         "oklch(58% 0.19 300)"   # violet — accepted / Domain
  cat-4:         "oklch(64% 0.16 145)"   # green — resolved / UserJourney / good node
  cat-5:         "oklch(60% 0.02 250)"   # slate — neutral fallback
  cat-6:         "oklch(66% 0.16 200)"   # sky — accent node, Erd
  # DD-02 ordinal severity ramp (low → critical)
  sev-1:         "oklch(64% 0.16 145)"   # green — low
  sev-2:         "oklch(75% 0.15 95)"    # yellow — medium
  sev-3:         "oklch(70% 0.17 55)"    # orange — high
  sev-4:         "oklch(60% 0.22 25)"    # red — critical
  sev-5:         "oklch(48% 0.20 20)"    # deep red — reserved
  # DD-02 tint / soft family (light backgrounds for chips/rows)
  good-soft:     "oklch(95% 0.03 145)"
  warn-soft:     "oklch(95% 0.04 80)"
  danger-soft:   "oklch(95% 0.03 25)"
  muted-soft:    "oklch(96% 0.004 250)"
  info:          "oklch(60% 0.14 235)"
  info-soft:     "oklch(95% 0.03 235)"
  accent-bg:     "oklch(96% 0.03 255)"   # light accent row highlight
  # DD-02 interaction family
  hover:         "oklch(97% 0.004 250)"  # surface hover
  accent-hover:  "oklch(52% 0.18 255)"
  accent-fg:     "oklch(100% 0 0)"       # text on accent fill
  ent-color:     "oklch(58% 0.18 255)"   # base default; ERD overrides inline
  edge-arrow:    "oklch(36% 0.12 250)"   # canvas edge arrowhead

typography:
  h1:
    font_family: "SF Pro Display"
    size_px: 24
    weight: 600
    line_height: 1.2
    letter_spacing: "-0.022em"
  h2:
    font_family: "SF Pro Display"
    size_px: 17
    weight: 600
    line_height: 1.3
    letter_spacing: "-0.015em"
  h3:
    font_family: "SF Pro Display"
    size_px: 14
    weight: 600
    line_height: 1.35
    letter_spacing: "-0.01em"
  body:
    font_family: "SF Pro Text"
    size_px: 14
    weight: 400
    line_height: 1.5
    letter_spacing: "normal"
  lede:
    font_family: "SF Pro Text"
    size_px: 13.5
    weight: 400
    line_height: 1.5
    letter_spacing: "normal"
  mono:
    font_family: "SF Mono"
    size_px: 12.5
    weight: 400
    line_height: 1.4
    letter_spacing: "normal"
  caption-mono:
    font_family: "SF Mono"
    size_px: 10
    weight: 500
    line_height: 1.4
    letter_spacing: "0.1em"
    transform: "uppercase"

spacing:
  xs:  "4px"
  sm:  "8px"
  md:  "12px"
  lg:  "18px"
  xl:  "24px"
  2xl: "28px"
  3xl: "48px"

# DD-02 motion family — quiet, ≤200ms (pwa-ux-conformance T-01)
motion:
  dur-fast:    "120ms"
  dur-base:    "200ms"
  ease-out:    "cubic-bezier(0.2, 0, 0, 1)"
  ease-linear: "linear"
  ease-in-out: "cubic-bezier(0.4, 0, 0.2, 1)"

# DD-01 legacy aliases — rename bridges emitted as --legacy: var(--canonical)
# in a second :root block by the generator. See pwa-ux-conformance §5a.
legacy_aliases:
  success:        "good"
  warning:        "warn"
  rule:           "border"
  border-subtle:  "border"
  chip-bg:        "surface-2"
  bg-subtle:      "surface-2"
  bg-2:           "surface-2"
  text:           "fg"
  tone-good:      "good"
  tone-warn:      "warn"
  tone-danger:    "danger"
  tone-accent:    "accent"
  tone-neutral:   "muted"
  warn-bg:        "warn-soft"
  warn-fg:        "warn-text"
  warning-bg:     "warn-soft"
  warning-fg:     "warn-text"
  warning-border: "warn"
  warning-bg-hover: "warn-soft"
  warning-soft:   "warn-soft"
  success-subtle: "good-soft"
  success-soft:   "good-soft"
  danger-subtle:  "danger-soft"
  success-bg:     "good-soft"
  success-fg:     "good-text"
  error-bg:       "danger-soft"
  error-fg:       "danger-text"
  error:          "danger"
  surface-3:      "surface-2"

# Layout dimensions — companygraph-specific addition (not in the PA
# schema). Consumed by hand-rolled components, not auto-emitted.
layout:
  rail_width:  "220px"
  topbar_h:    "52px"
  subnav_h:    "44px"
  panel_w:     "320px"            # right-side panel in journey shell
  collapse_at: "1100px"            # topbar metric-collapse breakpoint
  collapse_at_2col: "1080px"       # two-column shell collapse breakpoint

roundness:
  xs:    "2px"
  sm:    "3px"
  md:    "5px"
  lg:    "6px"
  pill:  "10px"
  round: "50%"

# Animation — minimal vocabulary; companygraph deliberately quiet.
animation:
  sla_pulse:
    name: "slaPulse"
    duration: "1.6s"
    timing: "ease-in-out"
    iteration: "infinite"
    keyframes:
      "0%, 100%": { opacity: 1 }
      "50%":      { opacity: 0.35 }
